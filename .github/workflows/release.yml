name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build
        run: |
          b() { CGO_ENABLED=0 GOOS=$1 GOARCH=$2 go build -trimpath -ldflags='-w -w -buildid=' -o melu_$1_$2 ./cmd/melu; }
          b linux amd64
          b linux arm64

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} melu_*_*
